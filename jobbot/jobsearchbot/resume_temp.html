    <title>Dynamic Resume</title>
    <style>
        body {
            margin: 0;
            background: #f7f7f7;
            font-family: "Charter", "Segoe UI", sans-serif;
        }

        .page {
            width: 850px;
            margin: 0px;
            background: #fff;
            padding: 4px 4px;
            border: 1px solid #e0e0e0;
            box-sizing: border-box;
        }

        @page {
            margin: 0;
        }

        .header {
            text-align: center;
        }

        .name {
            font-size: 20px;
            font-weight: bold;
        }

        .contact a {
            margin: 0 4px;
            text-decoration: none;
            color: #000;
            font-size: 13px;
        }

        section {
            margin-top: 2px;
        }

        section h2 {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
            color: #228B22;
        }

        .divider {
            border-top: 1px solid #000;
            margin-top: 2px;
            width: 100%;
        }


        .section-content {
            margin-top: 0px;
            font-size: 14px;
        }

        ul {
            margin: 1px;
            padding-left: 1px;
        }

        li {
            margin: 1px;
            padding: 0;
        }

        .education-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-title {
            font-weight: normal;
            font-size: 14px;
        }

        .certifications-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
        }

        .certification-item {
            flex: 0 0 49.5%;
            box-sizing: border-box;
        }
    </style>
</head>

    <script>
        const r = resumejson;



        document.getElementById("name").textContent = r.name;

        document.getElementById("contact").innerHTML = `
    ·<a href="mailto:${r.contact.email}">${r.contact.email}</a>·
    <a>${r.contact.phone}</a>·
    <a href="${r.contact.github}">GitHub</a>·
    <a href="${r.contact.linkedin}">LinkedIn</a>·
    <a href="${r.contact.portfolio}">Portfolio</a>·
`;

        document.getElementById("summary").textContent = r.summary;
        // ...existing code...
        document.getElementById("experience").innerHTML =
            (r.experience && r.experience.length > 0)
                ? r.experience.map(ex => `
            <div class="item-title" style="font-weight:bold; display:flex; justify-content:space-between;">
                <span>${ex.title} - ${ex.company}</span>
                <span style="font-weight:normal;">${ex.dates || ""}</span>
            </div>
            <ul>
                ${ex.bullets.map(b =>
                    `<li>${b.replace(/(\d+(?:st|nd|rd|th)?|[0-9]+%)/g, '<b>$1</b>')}</li>`
                ).join("")}
            </ul>
        `).join('<div style="height:3px"></div>')
                : "<i>No experience listed.</i>";
        // ...existing code...

        // ...existing code...
        document.getElementById("projects").innerHTML = r.projects.map(p => `
    <div class="item-title" style="font-weight:bold;">
        ${p.name} <span style="font-weight:normal;">(${p.tech.join(", ")})</span>
    </div>
    <ul style="margin-left:0px;">
        ${p.bullets.map(b => `<li>${b}</li>`).join("")}
    </ul>
`).join('<div style="height:3px"></div>');
        // ...existing code...

        // ...existing code...
        let skillsHTML = "";
        Object.entries(r.skills).forEach(([category, items]) => {
            skillsHTML += `<b>${category}:</b> ${items.join(", ")}<br>`;
        });
        document.getElementById("skills").innerHTML = skillsHTML;
        // ...existing code...


        // ...existing code...
        document.getElementById("education").innerHTML = r.education.map(e => {
            const details = Object.entries(e.details).map(d =>
                `${d[0]}: <b>${d[1]}</b>`
            ).join(", ");
            return `
        <div class="item-title" style="margin-bottom:2px;">

`;
